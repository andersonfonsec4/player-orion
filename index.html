<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- PWA / Mobile -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="OrionPlayer" />
    <meta name="theme-color" content="#020617" />
    <meta name="color-scheme" content="dark light" />

    <!-- SEO -->
    <meta
      name="description"
      content="Orion Player - Player de música offline moderno"
    />

    <title>OrionPlayer</title>

    <!-- 🔥 IMPORTANTE: caminhos relativos -->
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="./assets/icon.png" />
    <link rel="manifest" href="./manifest.json" />
  </head>

  <body>
    <!-- 🎵 BOTÃO -->
    <button id="addMusicFloat" aria-label="Adicionar músicas">🎵</button>

    <!-- 🔹 TOPO MOBILE -->
    <div class="mobile-top">
      <img src="./assets/logo.png" alt="Orion Player" class="mobile-logo" />
      <div id="miniPlaylist"></div>
    </div>

    <!-- 🔹 OVERLAY -->
    <div id="overlay"></div>

    <div class="app">
      <!-- 🔹 SIDEBAR -->
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <img src="./assets/logo.png" alt="Orion Player" />
        </div>

        <label class="upload-btn" id="dropZone">
          🎵 Adicionar músicas
          <input type="file" id="fileInput" accept="audio/*" multiple hidden />
        </label>

        <p class="drop-hint">ou arraste arquivos aqui</p>

        <ul id="playlistUI"></ul>
      </aside>

      <!-- 🔹 MAIN -->
      <main class="main">
        <div class="vinyl">
          <img
            id="cover"
            src="./assets/default-cover.png"
            alt="Capa do álbum"
          />
        </div>

        <p id="trackName">Nenhuma música carregada</p>
        <div class="equalizer">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <p id="timeDisplay">00:00 / 00:00</p>

        <audio id="audio" preload="metadata"></audio>

        <!-- CONTROLES -->
        <div class="controls">
          <button id="shuffleBtn" title="Embaralhar">🔀</button>
          <button id="prevBtn" title="Anterior">⏮</button>
          <button
            id="playBtn"
            class="play"
            title="Play/Pause"
            aria-label="Play ou Pausar"
          >
            ▶
          </button>
          <button id="nextBtn" title="Próxima">⏭</button>
          <button id="repeatBtn" title="Repetir">🔁</button>
        </div>

        <!-- VOLUME -->
        <div class="volume-control">
          <button id="muteBtn" title="Silenciar">🔊</button>
          <input
            type="range"
            id="volume"
            min="0"
            max="1"
            step="0.01"
            value="1"
          />
        </div>
      </main>
    </div>

    <!-- 🔻 PLAYER BAR -->
    <div class="bottom-bar">
      <div class="bottom-left">
        <img
          id="miniCover"
          src="./assets/default-cover.png"
          alt="Capa da música"
        />
        <div class="track-info">
          <span id="miniTrackName">Nenhuma música</span>
        </div>
      </div>

      <div class="bottom-center">
        <span id="currentTime">00:00</span>
        <input
          type="range"
          id="progress"
          value="0"
          min="0"
          max="100"
          step="1"
        />
        <span id="totalTime">00:00</span>
      </div>
    </div>

    <!-- Scripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/jsmediatags/dist/jsmediatags.min.js"
      defer
    ></script>

    <script src="./player.js" defer></script>

    <!-- 🔥 SERVICE WORKER (ESSENCIAL PRA FUNCIONAR NO GITHUB) -->
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("./sw.js")
          .then(() => console.log("SW registrado"))
          .catch((err) => console.log("Erro SW:", err));
      }
    </script>
  </body>
</html>
